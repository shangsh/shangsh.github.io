# Hexo Butterfly Theme Configuration
# =========================================
# Customized for Geek Terminal Style

# 导航栏
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

# 菜单
menu:
  Home: / || home
  Archives: /archives/ || archive
  Tags: /tags/ || tags
  Categories: /categories/ || th

# 代码块设置
code_blocks:
  theme: darker
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# 社交链接
# social:
  # github: https://github.com/haoge || Github || '#24292e'

# 图片设置
favicon: /img/favicon.ico

avatar:
  img: /img/butterfly-icon.png
  effect: false

# 禁用顶部图片
disable_top_img: true

# 背景
background: false

# 封面
cover:
  index_enable: true
  aside_enable: true
  post_enable: true
  desktop_not_display: false
  mobile_not_display: true
  dynamic: false

# 侧边栏
aside:
  enable: true
  mobile: true
  button: true
  highlight: true
  social: true
  share: true
  ads: false

# 文章页
post:
  author:
    enable: true
  date_format: YYYY-MM-DD HH:mm:ss
  updated_format: YYYY-MM-DD HH:mm:ss
  copyright: false
  license: CC BY-NC-SA 4.0
  toc: true
  number: true
  copy_button:
    enable: true

# 页面
page:
  comments:
    enable: true
    type: disqus

# 第三方评论
comments:
  enable: false
  type: disqus

# 搜索
search:
  enable: true
  type: local
  algolia:
    appId:
    apiKey:
    indexName:
  local:
    search_lib: search.json
    path: search.json
    field: post
    content: true
    template: layout/searchbar

# 统计
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# 页脚
footer:
  owner: true
  since: 2024
  theme_info: false

# 动画
darkmode: false
entryTag: false

# 自定义 CSS
inject:
  head:
    - <link rel="stylesheet" href="/css/geek-terminal.css">
    - <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  bottom:

# 扩展
plugins:
  mathjax: false
  katex: false
  mermaid: false

# 精简页脚信息
footer_custom: true
